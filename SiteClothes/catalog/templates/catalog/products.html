{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог</title>
    <link rel="shortcut icon" href="{% static 'image/logo1.png' %}" type="image/x-icon">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
{% block content %}
    <header class="header">
        <div class="index-div index-div1">
            <ul class="index-div-list">
                <li><a href="/"><img src="{% static 'image/logo2.png' %}" alt="" class="index-div-logo"></a></li>
                <li class="index-div-list-item"><a href="/products/" class="index-div-list-item-text">Каталог</a></li>
                <li class="index-div-list-item"><a href="" class="index-div-list-item-text">Новинки и акции</a></li>
                <li class="index-div-list-item"><a href="/news/" class="index-div-list-item-text">Новости магазина</a></li>
                <li class="index-div-list-item"><a href="/contacts/" class="index-div-list-item-text">Контактная информация</a></li>
                <div class="buy-profil">
                    <li><a href="/cart/"><img src="{% static 'image/buy.png' %}" alt="" class="index-div-profil"></a></li>
                    <li><a href="{% url 'login' %}"><img src="{% static 'image/profil.png' %}" alt="" class="index-div-profil"></a></li>
                </div>
            </ul>
        </div>
    </header>
    <section class="section section-catalog">
        <div class="fake fake1"><br></div>
        <div class="div-catalog">
            <div class="catalog-carts">
                {% for product in products %}
                <div class="catalog-cart">
                    <img class="cart-img" src="{{ product.imgg.url }}" alt="">
                    <div class="all-text-cart">
                    <div class="name-text-cart">
                        <h2 class="cart-title">{{ product.title }}</h2>
                        <p class="cart-text-price">{{ product.summ }} ₽</p>
                    </div>
                        <p class="cart-text cart-text-brend">{{ product.brendd }}</p>
                        <div class="cart-text-href1">
                            <a class="cart-text-href" href="{% url 'catalog:add_to_cart' product.id %}">Добавить в корзину</a>
                         </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
{% endblock %}
</body>
</html>

{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости магазина</title>
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link rel="shortcut icon" href="{% static 'image/logo1.png' %}" type="image/x-icon">
</head>
<body>
{% block content %}
    <header class="header">
        <div class="index-div index-div1">
            <ul class="index-div-list">
                <li><a href="/"><img src="{% static 'image/logo2.png' %}" alt="" class="index-div-logo"></a></li>
                <li class="index-div-list-item"><a href="/products/" class="index-div-list-item-text">Каталог</a></li>
                <li class="index-div-list-item"><a href="" class="index-div-list-item-text">Новинки и акции</a></li>
                <li class="index-div-list-item"><a href="/news/" class="index-div-list-item-text">Новости магазина</a></li>
                <li class="index-div-list-item"><a href="/contacts/" class="index-div-list-item-text">Контактная информация</a></li>
                <div class="buy-profil">
                    <li><a href="/cart/"><img src="{% static 'image/buy.png' %}" alt="" class="index-div-profil"></a></li>
                    <li><a href="{% url 'login' %}"><img src="{% static 'image/profil.png' %}" alt="" class="index-div-profil"></a></li>
                </div>
            </ul>
        </div>
    </header>
    <section class="section section-news">
        <div class="fake"><br></div>
        <div class="div-news-all">
            {% for el in news %}
            <div class="div-news">
                <img class="news-img" src="{{ el.img.url }}" alt="">
                <div class="news-title-text">
                    <h2 class="news-title">{{ el.name }}</h2>
                    <p class="news-text">{{ el.text }}</p>
                    <div class="div-btn-news">
                        <button class="news-btn"><a href="/products/">Каталог</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>
{% endblock %}
</body>
</html>
